<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HoopQueue Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a3a;
      --accent: #f97316;
      --accent-dim: rgba(249,115,22,0.15);
      --green: #22c55e;
      --red: #ef4444;
      --text: #f1f1f5;
      --muted: #8888a8;
      --input-bg: #0f0f18;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; width: 360px; text-align: center;
    }
    .login-box .logo { font-size: 40px; margin-bottom: 12px; }
    .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .login-box input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 16px; padding: 12px 16px; margin-bottom: 14px; outline: none;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%; background: var(--accent); color: #fff; font-size: 15px; font-weight: 600;
      border: none; border-radius: 10px; padding: 13px; cursor: pointer;
    }
    .login-box button:hover { opacity: 0.9; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

    /* ── Main app ── */
    #app { display: none; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
    .topbar-brand .ball { font-size: 22px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .stat-chip {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 5px 14px; font-size: 13px; color: var(--muted);
    }
    .stat-chip span { color: var(--text); font-weight: 600; }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
      padding: 6px 14px; font-size: 13px; cursor: pointer;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* ── Add court button ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h2 { font-size: 20px; font-weight: 700; }
    .btn-add {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .btn-add:hover { opacity: 0.9; }

    /* ── Filters ── */
    .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-input {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 9px; padding: 9px 14px; font-size: 14px; outline: none; flex: 1; min-width: 180px;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 9px; padding: 9px 14px; font-size: 14px; outline: none; cursor: pointer;
    }

    /* ── Courts table ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--card); text-align: left; padding: 12px 16px; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600;
    }
    tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: var(--card); }
    td { padding: 13px 16px; font-size: 14px; vertical-align: middle; }
    td.name { font-weight: 600; }
    td.city { color: var(--muted); font-size: 13px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px; border-radius: 20px;
      padding: 3px 10px; font-size: 12px; font-weight: 600;
    }
    .badge-indoor { background: rgba(99,102,241,0.15); color: #818cf8; }
    .badge-outdoor { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-asphalt { background: rgba(148,163,184,0.1); color: #94a3b8; }
    .badge-hardwood { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge-concrete { background: rgba(203,213,225,0.1); color: #cbd5e1; }
    .action-btns { display: flex; gap: 8px; }
    .btn-edit {
      background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(249,115,22,0.3);
      border-radius: 7px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-edit:hover { background: var(--accent); color: #fff; }
    .btn-del {
      background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 7px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-del:hover { background: var(--red); color: #fff; }
    .empty-row td { text-align: center; color: var(--muted); padding: 40px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      width: 620px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 28px;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 22px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 9px; padding: 10px 13px; font-size: 14px; outline: none; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .btn-cancel {
      background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 9px;
      padding: 10px 20px; font-size: 14px; cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-save {
      background: var(--accent); color: #fff; border: none; border-radius: 9px;
      padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 20px; font-size: 14px; font-weight: 500; z-index: 999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }

    /* ── Confirm ── */
    .confirm-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 300; align-items: center; justify-content: center;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 28px; width: 340px; text-align: center;
    }
    .confirm-box h4 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
    .confirm-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .confirm-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-confirm-cancel { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 9px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    .btn-confirm-del { background: var(--red); color: #fff; border: none; border-radius: 9px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }

    @media (max-width: 700px) {
      .form-grid { grid-template-columns: 1fr; }
      td.city, td:nth-child(4), thead th:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🏀</div>
    <h1>HoopQueue Admin</h1>
    <p>Manage courts across all cities</p>
    <input type="password" id="pw-input" placeholder="Admin password" autocomplete="current-password" />
    <button onclick="login()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="ball">🏀</span>
      HoopQueue Admin
    </div>
    <div class="topbar-right">
      <div class="stat-chip">Courts: <span id="total-count">–</span></div>
      <div class="stat-chip">Cities: <span id="city-count">–</span></div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <h2>All Courts</h2>
      <button class="btn-add" onclick="openModal()">+ Add Court</button>
    </div>

    <div class="filters">
      <input class="filter-input" id="search" placeholder="Search courts or cities..." oninput="renderTable()" />
      <select class="filter-select" id="filter-type" onchange="renderTable()">
        <option value="">All types</option>
        <option value="outdoor">Outdoor</option>
        <option value="indoor">Indoor</option>
      </select>
      <select class="filter-select" id="filter-state" onchange="renderTable()">
        <option value="">All states</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>City</th>
            <th>Type</th>
            <th>Surface</th>
            <th>Hoops</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="court-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add Court</h3>
    <div class="form-grid">
      <div class="form-group full">
        <label>Full Name *</label>
        <input id="f-name" placeholder="e.g. Venice Beach Basketball Courts" />
      </div>
      <div class="form-group">
        <label>Short Name *</label>
        <input id="f-shortName" placeholder="e.g. Venice Beach" />
      </div>
      <div class="form-group">
        <label>City *</label>
        <input id="f-city" placeholder="e.g. Los Angeles" />
      </div>
      <div class="form-group">
        <label>State</label>
        <input id="f-state" placeholder="e.g. CA" value="CA" />
      </div>
      <div class="form-group">
        <label>Country</label>
        <input id="f-country" placeholder="e.g. US" value="US" />
      </div>
      <div class="form-group full">
        <label>Address *</label>
        <input id="f-address" placeholder="e.g. 1800 Ocean Front Walk, Venice, CA" />
      </div>
      <div class="form-group">
        <label>Latitude *</label>
        <input id="f-lat" type="number" step="0.0001" placeholder="e.g. 33.985" />
      </div>
      <div class="form-group">
        <label>Longitude *</label>
        <input id="f-lng" type="number" step="0.0001" placeholder="e.g. -118.469" />
      </div>
      <div class="form-group">
        <label>Type *</label>
        <select id="f-type">
          <option value="outdoor">Outdoor</option>
          <option value="indoor">Indoor</option>
        </select>
      </div>
      <div class="form-group">
        <label>Surface *</label>
        <select id="f-surface">
          <option value="asphalt">Asphalt</option>
          <option value="concrete">Concrete</option>
          <option value="hardwood">Hardwood</option>
        </select>
      </div>
      <div class="form-group">
        <label>Hoops</label>
        <input id="f-hoops" type="number" min="1" max="20" value="4" />
      </div>
      <div class="form-group">
        <label>Base Players</label>
        <input id="f-base" type="number" min="0" max="10" value="5" />
      </div>
      <div class="form-group full">
        <label>Description *</label>
        <textarea id="f-desc" placeholder="Brief description of the court and its vibe..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveCourt()">Save Court</button>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h4>Delete Court?</h4>
    <p id="confirm-name">This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let adminPassword = '';
  let courts = [];
  let editingId = null;
  let deletingId = null;

  // ── Auth ──────────────────────────────────────────────────────────────────

  async function login() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      const res = await fetch('/api/admin/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminPassword: pw }),
      });
      const data = await res.json();
      if (res.ok) {
        adminPassword = pw;
        sessionStorage.setItem('hq_admin_pw', pw);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadCourts();
      } else {
        errEl.textContent = data.message || 'Incorrect password.';
        errEl.style.display = 'block';
      }
    } catch (e) {
      errEl.textContent = 'Network error. Try again.';
      errEl.style.display = 'block';
    }
  }

  function logout() {
    adminPassword = '';
    sessionStorage.removeItem('hq_admin_pw');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('pw-input').value = '';
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // Auto-login if session has password — re-verify on load
  const savedPw = sessionStorage.getItem('hq_admin_pw');
  if (savedPw) {
    fetch('/api/admin/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: savedPw }),
    }).then(r => {
      if (r.ok) {
        adminPassword = savedPw;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadCourts();
      } else {
        sessionStorage.removeItem('hq_admin_pw');
      }
    }).catch(() => sessionStorage.removeItem('hq_admin_pw'));
  }

  // ── Load ──────────────────────────────────────────────────────────────────

  async function loadCourts() {
    const res = await fetch('/api/courts');
    courts = await res.json();
    populateStateFilter();
    renderTable();
  }

  function populateStateFilter() {
    const states = [...new Set(courts.map(c => c.state || 'CA'))].sort();
    const sel = document.getElementById('filter-state');
    sel.innerHTML = '<option value="">All states</option>';
    states.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sel.appendChild(o);
    });
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const type = document.getElementById('filter-type').value;
    const state = document.getElementById('filter-state').value;

    const filtered = courts.filter(c => {
      const matchQ = !q || c.name.toLowerCase().includes(q) || c.city.toLowerCase().includes(q) || c.address.toLowerCase().includes(q);
      const matchType = !type || c.type === type;
      const matchState = !state || (c.state || 'CA') === state;
      return matchQ && matchType && matchState;
    });

    const cities = new Set(courts.map(c => c.city));
    document.getElementById('total-count').textContent = courts.length;
    document.getElementById('city-count').textContent = cities.size;

    const tbody = document.getElementById('court-table-body');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No courts found</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(c => `
      <tr>
        <td class="name">${esc(c.name)}</td>
        <td class="city">${esc(c.city)}, ${esc(c.state || 'CA')}</td>
        <td><span class="badge badge-${c.type}">${c.type}</span></td>
        <td><span class="badge badge-${c.surface}">${c.surface}</span></td>
        <td>${c.hoops}</td>
        <td>
          <div class="action-btns">
            <button class="btn-edit" onclick="openEdit('${esc(c.id)}')">Edit</button>
            <button class="btn-del" onclick="openDelete('${esc(c.id)}', '${esc(c.name)}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Modal ─────────────────────────────────────────────────────────────────

  function openModal(court = null) {
    editingId = court ? court.id : null;
    document.getElementById('modal-title').textContent = court ? 'Edit Court' : 'Add Court';
    document.getElementById('f-name').value = court?.name || '';
    document.getElementById('f-shortName').value = court?.shortName || '';
    document.getElementById('f-city').value = court?.city || '';
    document.getElementById('f-state').value = court?.state || 'CA';
    document.getElementById('f-country').value = court?.country || 'US';
    document.getElementById('f-address').value = court?.address || '';
    document.getElementById('f-lat').value = court?.latitude || '';
    document.getElementById('f-lng').value = court?.longitude || '';
    document.getElementById('f-type').value = court?.type || 'outdoor';
    document.getElementById('f-surface').value = court?.surface || 'asphalt';
    document.getElementById('f-hoops').value = court?.hoops || 4;
    document.getElementById('f-base').value = court?.basePlayersPlaying || 5;
    document.getElementById('f-desc').value = court?.description || '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function openEdit(id) {
    const court = courts.find(c => c.id === id);
    if (court) openModal(court);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null;
  }

  async function saveCourt() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const body = {
      adminPassword,
      name: document.getElementById('f-name').value.trim(),
      shortName: document.getElementById('f-shortName').value.trim(),
      city: document.getElementById('f-city').value.trim(),
      state: document.getElementById('f-state').value.trim() || 'CA',
      country: document.getElementById('f-country').value.trim() || 'US',
      address: document.getElementById('f-address').value.trim(),
      latitude: parseFloat(document.getElementById('f-lat').value),
      longitude: parseFloat(document.getElementById('f-lng').value),
      type: document.getElementById('f-type').value,
      surface: document.getElementById('f-surface').value,
      hoops: parseInt(document.getElementById('f-hoops').value) || 4,
      basePlayersPlaying: parseInt(document.getElementById('f-base').value) || 5,
      maxPlayers: 10,
      description: document.getElementById('f-desc').value.trim(),
    };

    if (!body.name || !body.shortName || !body.city || !body.address || !body.latitude || !body.longitude || !body.description) {
      showToast('Please fill in all required fields.', 'error');
      btn.disabled = false; btn.textContent = 'Save Court';
      return;
    }

    const url = editingId ? `/api/admin/courts/${editingId}` : '/api/admin/courts';
    const method = editingId ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        showToast(editingId ? 'Court updated!' : 'Court added!', 'success');
        closeModal();
        await loadCourts();
      } else {
        const err = await res.json();
        showToast(err.message || 'Failed to save', 'error');
      }
    } catch (e) {
      showToast('Network error', 'error');
    }

    btn.disabled = false; btn.textContent = 'Save Court';
  }

  // ── Delete ────────────────────────────────────────────────────────────────

  function openDelete(id, name) {
    deletingId = id;
    document.getElementById('confirm-name').textContent = `"${name}" will be permanently removed.`;
    document.getElementById('confirm-overlay').classList.add('open');
  }

  function closeConfirm() {
    document.getElementById('confirm-overlay').classList.remove('open');
    deletingId = null;
  }

  async function confirmDelete() {
    if (!deletingId) return;
    try {
      const res = await fetch(`/api/admin/courts/${deletingId}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
        body: JSON.stringify({ adminPassword }),
      });
      if (res.ok) {
        showToast('Court deleted.', 'success');
        closeConfirm();
        await loadCourts();
      } else {
        showToast('Failed to delete', 'error');
      }
    } catch (e) {
      showToast('Network error', 'error');
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3000);
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
</script>
</body>
</html>
